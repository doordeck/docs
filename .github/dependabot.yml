version: 2
updates:
- package-ecosystem: "npm"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "08:00"
    timezone: "Europe/London"
  open-pull-requests-limit: 10
  groups:
    docusaurus:
      patterns: ["@docusaurus/*"]
      update-types: ["major", "minor", "patch"]
    react:
      patterns: ["react", "react-dom"]
      update-types: ["major", "minor", "patch"]

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "08:00"
    timezone: "Europe/London"
  groups:
    actions-all:
      patterns: ["*"]
      update-types: ["major", "minor", "patch"]
