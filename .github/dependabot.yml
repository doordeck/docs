version: 2
updates:
- package-ecosystem: "npm"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "08:00"
    timezone: "Europe/London"
  open-pull-requests-limit: 10

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "08:00"
    timezone: "Europe/London"
  groups:
    actions-all:
      patterns: ["*"]
      update-types: ["major", "minor", "patch"]
